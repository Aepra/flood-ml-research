version: '3.8'

services:
  flood-ml:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flood-ml-research
    image: flood-ml:latest
    volumes:
      - ./data:/app/data
      - ./results:/app/results
      - ./models:/app/models
      - ./notebooks:/app/notebooks
      - ./src:/app/src
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - PYTHONUNBUFFERED=1
    working_dir: /app
    command: >
      bash -c "
        pip install jupyter-lab ipywidgets nbconvert --no-cache-dir &&
        mkdir -p /app/notebooks/outputs &&
        jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root
      "
    stdin_open: true
    tty: true
